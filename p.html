<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="p.css">
    <link rel="icon" href="logo.png" type="image/x-icon">
    <title>شوذاتك - تفاصيل المنتج</title>
</head>
<body>
    <div class="montag"> 
        <div class="title">شوذاتك</div>
        <div class="t1"><a href="home.html">الأحذية</a></div>
        <div class="t2"><a href="#">التواصل</a></div>
    </div>

    <div class="product-container">
        <div class="product-images">
            <div class="main-image">
                <img id="main-product-img" data-src="RU26033.webp" alt="صورة المنتج الرئيسية">
            </div>
            <div class="thumbnail-images">
                <img class="thumbnail active" data-src="RU26033.webp" alt="صورة 1" onclick="changeMainImage('RU26033.webp')">
                <img class="thumbnail" data-src="RU26033h.webp" alt="صورة 2" onclick="changeMainImage('RU26033h.webp')">
            </div>
        </div>

        <div class="product-info">
            <h1 class="product-name" id="product-name">Urban-WHITE/DARK GREEN</h1>
            <div class="product-price">
                <span class="price" id="product-price">250</span>
                <span class="currency">جنيه</span>
            </div>
            
            <div class="product-description">
                <h3>الوصف</h3>
                <p>حذاء رياضي أنيق ومريح من مجموعة Urban، مصمم للراحة والأسلوب. يتميز بتصميم عصري وألوان جذابة تناسب جميع الأذواق.</p>
            </div>

            <div class="size-selection">
                <h3>اختر المقاس</h3>
                <div class="sizes">
                    <button class="size-btn" onclick="selectSize(this)">38</button>
                    <button class="size-btn" onclick="selectSize(this)">39</button>
                    <button class="size-btn active" onclick="selectSize(this)">40</button>
                    <button class="size-btn" onclick="selectSize(this)">41</button>
                    <button class="size-btn" onclick="selectSize(this)">42</button>
                    <button class="size-btn" onclick="selectSize(this)">43</button>
                    <button class="size-btn" onclick="selectSize(this)">44</button>
                </div>
            </div>

            <div class="color-selection">
                <h3>اختر اللون</h3>
                <div class="colors">
                    <div class="color-option active" style="background-color: #ffffff; border: 2px solid #0F555A;" onclick="selectColor(this)"></div>
                    <div class="color-option" style="background-color: #263743;" onclick="selectColor(this)"></div>
                    <div class="color-option" style="background-color: #0F555A;" onclick="selectColor(this)"></div>
                    <div class="color-option" style="background-color: #8B4513;" onclick="selectColor(this)"></div>
                </div>
            </div>

            <div class="quantity-selection">
                <h3>الكمية</h3>
                <div class="quantity-controls">
                    <button class="qty-btn" onclick="decreaseQuantity()">-</button>
                    <span class="quantity" id="quantity">1</span>
                    <button class="qty-btn" onclick="increaseQuantity()">+</button>
                </div>
            </div>

            <div class="product-actions">
                <button class="add-to-cart-btn" onclick="addToCart()">
                    <span>إضافة إلى السلة</span>
                </button>
                <button class="buy-now-btn" onclick="buyNow()">
                    <span>شراء الآن</span>
                </button>
            </div>

            <div class="product-features">
                <div class="feature">
                    <span class="feature-icon">🚚</span>
                    <span>شحن مجاني</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">↩️</span>
                    <span>إرجاع مجاني</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">✓</span>
                    <span>ضمان الجودة</span>
                </div>
            </div>
        </div>
    </div>

    <script src="p.js"></script>
    <script src="lazy-load.js"></script>
</body>
</html>
